name: Weekly Retrain

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  retrain:
    name: Fetch → Features → Retrain → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install training dependencies
        run: |
          pip install \
            pandas>=2.0 numpy>=1.24 pyarrow>=12.0 \
            xgboost>=2.0 scikit-learn>=1.3 \
            mlflow>=2.10 \
            requests>=2.31 \
            hopsworks[python]>=4.0

      - name: Fetch latest MeteoSwiss data
        run: python src/data/fetch_meteoswiss.py recent

      - name: Rebuild features
        run: python src/features/build_features.py

      - name: Retrain models (pushes to Hopsworks registry)
        run: python src/models/train.py

      - name: Restart HF Space (loads new model on next request)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://huggingface.co/api/spaces/${{ vars.HF_SPACE }}/restart" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"
