name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  # Re-run CI before deploying
  test:
    name: Lint & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -r requirements.txt ruff
      - run: ruff check src/ pipelines/ --ignore E501
      - run: python -c "from src.features.build_features import FEATURE_COLS; print('ok')"
      - run: python -c "from src.api.app import app; print('ok')"

  deploy:
    name: Trigger Render deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy API to Render
        # Set RENDER_DEPLOY_HOOK_API in GitHub repo → Settings → Secrets
        # Get the URL from: Render dashboard → service → Settings → Deploy Hook
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"
          echo "API deploy triggered"

      - name: Deploy Streamlit to Render
        # Set RENDER_DEPLOY_HOOK_STREAMLIT in GitHub repo → Settings → Secrets
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STREAMLIT }}"
          echo "Streamlit deploy triggered"
